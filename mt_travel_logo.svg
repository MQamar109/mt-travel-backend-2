<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56">
  <!-- Circular navy badge -->
  <circle cx="26" cy="28" r="22" fill="#1F3A52"/>

  <!-- Airplane: top-down view, pointing right.
       SVG Y is downward: upper wing (visual top) = lower Y value. -->

  <!-- Fuselage: widest near cockpit (right), tapers to tail (left) -->
  <polygon points="8,28 12,27.5 28,26.2 38,25 44,28 38,31 28,29.8 12,28.5"
           fill="white"/>

  <!-- Port wing (upper in screen = lower SVG Y) -->
  <polygon points="25,27.8 33,28.2 17,13" fill="white"/>
  <!-- Starboard wing (lower in screen = higher SVG Y): muted underside tone -->
  <polygon points="25,28.2 33,27.8 17,43" fill="#6A9AB8"/>

  <!-- Horizontal stabilizers at tail -->
  <polygon points="9,28 14,23 18,27.8" fill="#2E75B6"/>
  <polygon points="9,28 14,33 18,28.2" fill="#2E75B6"/>

  <!-- Wordmark -->
  <text x="58" y="30" font-family="Helvetica,Arial,sans-serif" font-weight="bold"
        font-size="21" fill="#1F3A52" dominant-baseline="auto">MT</text>
  <line x1="58" y1="35" x2="155" y2="35" stroke="#2E75B6" stroke-width="0.7"/>
  <text x="58" y="47" font-family="Helvetica,Arial,sans-serif"
        font-size="9" fill="#2E75B6" letter-spacing="2">TRAVEL</text>
</svg>
